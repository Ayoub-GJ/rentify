function StatusBar(){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 20px 4px'}}>
      <span style={{fontFamily:'Poppins',fontWeight:600,fontSize:15,color:C.dark}}>9:30</span>
      <div style={{width:13,height:13,background:C.dark,borderRadius:'50%'}}/>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.5c2 0 3.8.8 5.1 2L15 3c-1.7-1.6-4-2.6-6.5-2.6S3.7 1.4 2 3l1.4 1.5C4.7 3.3 6.5 2.5 8.5 2.5z" fill={C.dark}/><path d="M8.5 5.8c1.2 0 2.2.5 3 1.2L13 5.5C11.8 4.5 10.2 3.9 8.5 3.9S5.2 4.5 4 5.5l1.5 1.5C6.3 6.3 7.3 5.8 8.5 5.8z" fill={C.dark}/><circle cx="8.5" cy="10" r="2" fill={C.dark}/></svg>
        <svg width="19" height="12" viewBox="0 0 19 12"><rect x="0" y="1" width="4" height="10" rx="1" fill={C.dark}/><rect x="5" y="3" width="4" height="8" rx="1" fill={C.dark}/><rect x="10" y="5" width="4" height="6" rx="1" fill={C.dark}/><rect x="15" y="0" width="3" height="12" rx="1" fill={C.dark} opacity=".25"/><rect x="15" y="0" width="3" height="8" rx="1" fill={C.dark}/></svg>
      </div>
    </div>
  );
}

function BottomNav({active,onNav}){
  const tabs=[
    {id:'home',render:(c)=>I.home(c,22),label:'Accueil'},
    {id:'search',render:(c)=>I.search(c,22),label:'Recherche'},
    {id:'add',render:null,label:''},
    {id:'locations',render:(c)=>I.box(c,22),label:'Locations'},
    {id:'profile',render:(c)=>I.user(c,22),label:'Profil'},
  ];
  return(
    <div style={{position:'absolute',bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',height:64,zIndex:100}}>
      {tabs.map(t=>t.id==='add'?(
        <div key="add" onClick={()=>onNav('addItem')} style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',cursor:'pointer'}}>
          <div style={{width:52,height:52,background:C.primary,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 14px rgba(232,93,38,.45)`,marginBottom:10}}>
            {I.plus('white',24)}
          </div>
        </div>
      ):(
        <div key={t.id} onClick={()=>onNav(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',color:active===t.id?C.primary:C.grayLight,paddingBottom:4}}>
          {t.render&&t.render(active===t.id?C.primary:C.grayLight)}
          <span style={{fontSize:10,fontWeight:active===t.id?600:400}}>{t.label}</span>
        </div>
      ))}
    </div>
  );
}

function Phone({children}){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:'20px 0'}}>
      <div style={{position:'relative',width:375,height:812,background:C.surface,borderRadius:44,overflow:'hidden',boxShadow:`0 40px 80px rgba(0,0,0,.22),0 0 0 1px rgba(0,0,0,.08)`,flexShrink:0}}>
        {children}
      </div>
    </div>
  );
}

function Badge({status}){
  const s=STATUS[status]||STATUS.pending;
  return <span style={{background:s.bg,color:s.color,fontSize:11,fontWeight:600,padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap'}}>{s.label}</span>;
}

function BackBtn({onPress}){
  return(
    <div onClick={onPress} style={{width:36,height:36,borderRadius:'50%',background:C.surface,border:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
      {I.arrow_left(C.dark)}
    </div>
  );
}

    <div style={{position:'absolute',inset:0,background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>

// SIGNUP
// ══════════════════════════════════
function Signup({onBack,onDone}){
  const[loading,setLoading]=useState(false);
  function go(){setLoading(true);setTimeout(()=>{setLoading(false);onDone();},900);}
  const fields=[
    {icon:I.user(C.grayLight),ph:'Nom complet',type:'text'},
    {icon:I.mail(C.grayLight),ph:'Adresse email',type:'email'},
    {icon:I.phone(C.grayLight),ph:'Téléphone (optionnel)',type:'tel'},
    {icon:I.lock(C.grayLight),ph:'Mot de passe',type:'password'},
  ];
  return(
    <div style={{position:'absolute',inset:0,background:C.bg,display:'flex',flexDirection:'column'}}>
      <StatusBar/>
      <div style={{padding:'4px 20px 12px',display:'flex',alignItems:'center',gap:12}}>
        <BackBtn onPress={onBack}/>
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',paddingBottom:16,gap:5}}>
        <div style={{fontFamily:'Poppins',fontWeight:700,fontSize:24,color:C.dark}}>Créer un compte</div>
        <div style={{fontSize:13,color:C.gray}}>Rejoignez la communauté Rentify</div>
      </div>
      <div style={{flex:1,background:C.surface,borderRadius:'24px 24px 0 0',padding:'24px 24px 32px',display:'flex',flexDirection:'column',gap:12,overflowY:'auto'}}>
        {fields.map((f,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:12,height:52,background:C.bg,borderRadius:999,border:`1.5px solid ${C.border}`,padding:'0 20px'}}>
            {f.icon}<input placeholder={f.ph} type={f.type} style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:15,color:C.dark}}/>
          </div>
        ))}
        <button onClick={go} style={{height:52,background:loading?C.primaryLight:C.primary,borderRadius:999,border:'none',color:'white',fontFamily:'Poppins',fontWeight:600,fontSize:16,cursor:'pointer',boxShadow:`0 4px 16px rgba(232,93,38,.4)`,marginTop:4}}>
          {loading?"Inscription…":"S'inscrire"}
        </button>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:12,color:C.grayLight}}>ou</span><div style={{flex:1,height:1,background:C.border}}/>
        </div>
        <button style={{height:52,background:C.surface,borderRadius:999,border:`1.5px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontSize:15,color:C.dark,cursor:'pointer',fontWeight:500}}>
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

function Chat({item,onBack}){
  const[msg,setMsg]=useState('');
  const[msgs,setMsgs]=useState(CHAT_MSGS);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);
  function send(){
    if(!msg.trim())return;
    setMsgs(m=>[...m,{id:Date.now(),from:'me',text:msg,time:'maintenant'}]);
    setMsg('');
    setTimeout(()=>setMsgs(m=>[...m,{id:Date.now()+1,from:'other',text:"D'accord, parfait ! À bientôt.",time:'maintenant'}]),1400);
  }
  return(
    <div style={{position:'absolute',inset:0,background:C.bg,display:'flex',flexDirection:'column'}}>
      <StatusBar/>
      <div style={{padding:'4px 16px 10px',background:C.surface,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
        <div onClick={onBack} style={{width:34,height:34,borderRadius:'50%',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
          {I.arrow_left(C.dark,16)}
        </div>
        <div style={{width:38,height:38,borderRadius:'50%',background:'#1A9E75',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative'}}>

        </div>
        <div style={{display:'flex',gap:6}}>
          {[I.phone,I.close].map((Ic,i)=>(

            </div>

      <div style={{background:C.primaryXLight,padding:'10px 16px',display:'flex',alignItems:'center',gap:10,borderBottom:`1px solid rgba(232,93,38,.12)`}}>
        <img src={item.img} alt={item.title} style={{width:36,height:36,borderRadius:8,objectFit:'cover',flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:12,color:C.dark,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</div>

            {I.calendar(C.grayLight,10)}15 → 17 Mai · 75 MAD
          </div>
        </div>
        <Badge status="pending"/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
        {msgs.map(m=>(
          <div key={m.id} style={{display:'flex',gap:8,flexDirection:m.from==='me'?'row-reverse':'row',alignItems:'flex-end'}}>
            {m.from==='other'&&(
              <div style={{width:28,height:28,borderRadius:'50%',background:'#1A9E75',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{color:'white',fontWeight:700,fontSize:10}}>AB</span>
              </div>
            )}
            <div style={{maxWidth:'72%'}}>
              <div style={{background:m.from==='me'?C.primary:C.surface,borderRadius:m.from==='me'?'16px 16px 2px 16px':'16px 16px 16px 2px',padding:'10px 14px',boxShadow:`0 1px 4px ${C.shadow}`}}>

              </div>
              <div style={{fontSize:10,color:C.grayLight,marginTop:3,textAlign:m.from==='me'?'right':'left'}}>{m.time}</div>
            </div>
          </div>
        ))}
        <div ref={endRef}/>
      </div>
      <div style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:'10px 16px 18px',display:'flex',gap:10,alignItems:'center'}}>
        <div style={{width:36,height:36,borderRadius:'50%',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
          {I.paperclip(C.grayLight)}
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',background:C.bg,borderRadius:999,border:`1.5px solid ${C.border}`,padding:'0 16px',height:44}}>
          <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Écrire un message..." style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:14,color:C.dark}}/>
        </div>
        <div onClick={send} style={{width:42,height:42,background:msg.trim()?C.primary:C.border,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:msg.trim()?'pointer':'default',transition:'background .15s',flexShrink:0}}>
          {I.send('white',16)}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════
// APP
// ══════════════════════════════════
function App(){
  const[screen,setScreen]=useState('splash');
  const[item,setItem]=useState(ITEMS[0]);
  const[hist,setHist]=useState([]);
  function go(s,it){setHist(h=>[...h,screen]);if(it)setItem(it);setScreen(s);}
  function back(){if(hist.length){const p=hist[hist.length-1];setHist(h=>h.slice(0,-1));setScreen(p);}}
  function nav(tab){
    setHist([]);
    const map={home:'home',search:'search',addItem:'addItem',locations:'locations',profile:'profile'};
    setScreen(map[tab]||'home');
  }
  return(
    <Phone>
      {screen==='splash'&&<Splash onDone={()=>setScreen('login')}/>}
      {screen==='login'&&<Login onLogin={()=>setScreen('home')} onSignup={()=>go('signup')}/>}
      {screen==='signup'&&<Signup onBack={back} onDone={()=>setScreen('home')}/>}
      {screen==='home'&&<Home onItem={it=>go('detail',it)} onNav={nav}/>}
      {screen==='search'&&<Search onItem={it=>go('detail',it)} onBack={back} onNav={nav}/>}
      {screen==='detail'&&<Detail item={item} onBack={back} onReserve={()=>go('reservation')} onChat={()=>go('chat')}/>}
      {screen==='reservation'&&<Reservation item={item} onBack={back} onConfirm={()=>go('confirmation')}/>}
      {screen==='confirmation'&&<Confirmation item={item} onHome={()=>nav('home')} onLocations={()=>nav('locations')}/>}
      {screen==='addItem'&&<AddItem onBack={back} onNav={nav} onDone={()=>nav('locations')}/>}
      {screen==='locations'&&<Locations onNav={nav}/>}
      {screen==='chat'&&<Chat item={item} onBack={back}/>}
      {screen==='profile'&&<Profile onNav={nav}/>}
    </Phone>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
